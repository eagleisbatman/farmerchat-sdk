name: CI — Docs

on:
  push:
    branches: [main]
    paths:
      - "packages/docs/**"
  pull_request:
    paths:
      - "packages/docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Docs
        run: pnpm --filter @digitalgreenorg/farmerchat-docs build
