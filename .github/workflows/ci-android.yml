name: CI — Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/android-compose/**"
      - "packages/android-views/**"
  pull_request:
    paths:
      - "packages/android-compose/**"
      - "packages/android-views/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Compose AAR
        working-directory: packages/android-compose
        run: ./gradlew assembleRelease

  build-views:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Views AAR
        working-directory: packages/android-views
        run: ./gradlew assembleRelease
