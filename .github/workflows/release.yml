name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @digitalgreenorg/farmerchat-core build

      - name: Publish Core
        run: pnpm --filter @digitalgreenorg/farmerchat-core publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-web:
    runs-on: ubuntu-latest
    needs: release-core
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @digitalgreenorg/farmerchat-web build

      - name: Publish Web
        run: pnpm --filter @digitalgreenorg/farmerchat-web publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-react-native:
    runs-on: ubuntu-latest
    needs: release-core
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build React Native
        run: pnpm --filter @digitalgreenorg/farmerchat-react-native build

      - name: Publish React Native
        run: pnpm --filter @digitalgreenorg/farmerchat-react-native publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Compose AAR
        working-directory: packages/android-compose
        run: ./gradlew assembleRelease

      - name: Build Views AAR
        working-directory: packages/android-views
        run: ./gradlew assembleRelease

      - name: Publish Compose to Maven Central
        working-directory: packages/android-compose
        run: ./gradlew publishReleasePublicationToMavenCentralRepository
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Publish Views to Maven Central
        working-directory: packages/android-views
        run: ./gradlew publishReleasePublicationToMavenCentralRepository
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

  release-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build SwiftUI XCFramework
        working-directory: packages/ios-swiftui
        run: |
          chmod +x build-xcframework.sh
          ./build-xcframework.sh

      - name: Build UIKit XCFramework
        working-directory: packages/ios-uikit
        run: |
          chmod +x build-xcframework.sh
          ./build-xcframework.sh

      - name: Create GitHub Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/ios-swiftui/build/*.xcframework.zip
            packages/ios-uikit/build/*.xcframework.zip
